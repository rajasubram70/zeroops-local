<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ZeroOps — AI-driven autonomous operations platform"
    />
    <title>ZeroOps Simulator</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #080b14;
        color: #cbd5e1;
        font-family: 'DM Sans', 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #080b14;
        z-index: 9999;
        gap: 16px;
      }
      #loading .logo {
        width: 52px;
        height: 52px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border-radius: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 900;
        color: #fff;
        box-shadow: 0 0 40px rgba(139, 92, 246, 0.3);
      }
      #loading .label {
        font-size: 13px;
        color: #475569;
        font-family: monospace;
        letter-spacing: 3px;
      }
      #loading .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(139, 92, 246, 0.2);
        border-top-color: #8b5cf6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="logo">Z</div>
      <div class="label">ZEROOPS</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var el = document.getElementById('loading');
          if (el) el.style.display = 'none';
        }, 400);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
